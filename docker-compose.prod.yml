services:
  web:
    build: .
    command: gunicorn "app:create_app()" --bind 0.0.0.0:5000 --workers 2 --threads 4 --timeout 120
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-f2p_catalog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
