{% if pagination.pages > 1 %}
  <nav aria-label="Paginación del catálogo">
    <ul class="pagination justify-content-center flex-wrap">
      <li class="page-item {% if not pagination.has_prev %}disabled{% endif %}">
        <a
          class="page-link"
          href="{{ url_for('games_bp.catalog', q=current_filters.q or None, genre=current_filters.genre or None, platform=current_filters.platform or None, publisher=current_filters.publisher or None, sort=current_filters.sort, page=pagination.prev_num if pagination.has_prev else pagination.page) }}"
        >Anterior</a>
      </li>

      {% for page_num in pagination.iter_pages(left_edge=1, left_current=2, right_current=2, right_edge=1) %}
        {% if page_num %}
          <li class="page-item {% if page_num == pagination.page %}active{% endif %}">
            <a
              class="page-link"
              href="{{ url_for('games_bp.catalog', q=current_filters.q or None, genre=current_filters.genre or None, platform=current_filters.platform or None, publisher=current_filters.publisher or None, sort=current_filters.sort, page=page_num) }}"
            >{{ page_num }}</a>
          </li>
        {% else %}
          <li class="page-item disabled"><span class="page-link">…</span></li>
        {% endif %}
      {% endfor %}

      <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
        <a
          class="page-link"
          href="{{ url_for('games_bp.catalog', q=current_filters.q or None, genre=current_filters.genre or None, platform=current_filters.platform or None, publisher=current_filters.publisher or None, sort=current_filters.sort, page=pagination.next_num if pagination.has_next else pagination.page) }}"
        >Siguiente</a>
      </li>
    </ul>
  </nav>
{% endif %}
